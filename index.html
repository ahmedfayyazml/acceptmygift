<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accept My Gift</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --pink: #ff8fb8;
      --pink-soft: #ffe3ee;
      --lavender: #d9c7ff;
      --lavender-soft: #f1eaff;
      --peach: #ffd6bd;
      --ink: #5a3b4d;
      --muted: #8b7483;
      --white-glass: rgba(255, 255, 255, 0.68);
      --border-glass: rgba(255, 255, 255, 0.72);
      --shadow: 0 24px 70px rgba(129, 80, 112, 0.22);
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      min-height: 100vh;
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: clamp(18px, 4vw, 42px);
      overflow-x: hidden;
      font-family: "Poppins", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 15%, rgba(255, 255, 255, 0.58), transparent 28%),
        linear-gradient(125deg, #ffd8e8, #e4d5ff, #ffd8c2, #f6c8dd);
      background-size: 180% 180%;
      animation: gradientFlow 14s ease-in-out infinite;
    }

    @keyframes gradientFlow {
      0% {
        background-position: 0% 40%;
      }

      50% {
        background-position: 100% 60%;
      }

      100% {
        background-position: 0% 40%;
      }
    }

    .gift-card {
      width: min(100%, 540px);
      max-height: calc(100svh - clamp(36px, 8vw, 84px));
      position: relative;
      display: grid;
      overflow-y: auto;
      overflow-x: hidden;
      padding: clamp(22px, 5vw, 44px);
      border: 1px solid var(--border-glass);
      border-radius: 32px;
      background: var(--white-glass);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
    }

    .screen {
      grid-area: 1 / 1;
      opacity: 0;
      visibility: hidden;
      transform: translateY(8px);
      pointer-events: none;
      transition: opacity 0.4s ease, transform 0.4s ease, visibility 0s linear 0.4s;
    }

    .screen.visible {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
      pointer-events: auto;
      transition: opacity 0.4s ease, transform 0.4s ease, visibility 0s;
    }

    .screen-inner {
      display: grid;
      justify-items: center;
      gap: 18px;
      text-align: center;
    }

    .placeholder {
      width: 100%;
      min-height: clamp(150px, 34vw, 210px);
      display: grid;
      place-items: center;
      padding: 24px;
      border-radius: 24px;
      color: rgba(90, 59, 77, 0.68);
      font-weight: 500;
      text-align: center;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.46);
    }

    .placeholder.gift,
    .placeholder.happy {
      background: linear-gradient(145deg, #ffe0ec, #ffd2e3);
    }

    .placeholder.angry {
      background: linear-gradient(145deg, #eeeeee, #dedde5);
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1,
    h2 {
      max-width: 100%;
      line-height: 1.15;
      letter-spacing: 0;
      color: #61334f;
    }

    h1 {
      font-size: clamp(2rem, 7vw, 3.35rem);
      font-weight: 700;
    }

    h2 {
      font-size: clamp(1.8rem, 6vw, 2.75rem);
      font-weight: 700;
    }

    p {
      max-width: 34rem;
      color: var(--muted);
      font-size: clamp(0.98rem, 2.8vw, 1.08rem);
      line-height: 1.7;
    }

    .actions {
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      padding-top: 4px;
    }

    button,
    .text-link,
    .try-again {
      font: inherit;
    }

    button {
      min-width: 130px;
      border: 0;
      border-radius: 999px;
      padding: 13px 26px;
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 14px 26px rgba(179, 89, 132, 0.22);
      filter: brightness(1.02);
    }

    button:focus-visible,
    .try-again:focus-visible,
    .text-link:focus-visible {
      outline: 3px solid rgba(180, 127, 255, 0.5);
      outline-offset: 4px;
    }

    .yes-button {
      color: #ffffff;
      background: linear-gradient(135deg, #ff93bb, #ff72a9);
    }

    .no-button {
      color: #7e6d8b;
      background: #eee6ff;
    }

    .open-button {
      min-width: 190px;
      color: #ffffff;
      background: linear-gradient(135deg, #b28cff, #8f6be8);
    }

    .try-again {
      width: min(100%, 260px);
      margin-top: 4px;
      padding: 20px 28px;
      border: 2px dashed #ff9fbd;
      border-radius: 22px;
      color: #7b4a5f;
      background: #fff2b8;
      box-shadow: 0 12px 24px rgba(171, 124, 69, 0.16);
      cursor: pointer;
      font-size: 1.22rem;
      font-weight: 700;
      text-align: center;
      transform: rotate(2deg);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .try-again:hover {
      transform: rotate(2deg) scale(1.04);
      box-shadow: 0 16px 28px rgba(171, 124, 69, 0.22);
    }

    .text-link {
      border: 0;
      padding: 6px 10px;
      color: #92718b;
      background: transparent;
      cursor: pointer;
      font-weight: 500;
      text-decoration: underline;
      text-underline-offset: 4px;
    }

    .fullscreen-video {
      width: 1px;
      height: 1px;
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
      opacity: 0;
      pointer-events: none;
      background: #000000;
      object-fit: contain;
    }

    .fullscreen-video:fullscreen {
      width: 100vw;
      height: 100vh;
      opacity: 1;
      pointer-events: auto;
    }

    .fullscreen-video:-webkit-full-screen {
      width: 100vw;
      height: 100vh;
      opacity: 1;
      pointer-events: auto;
    }

    .play-fallback {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: none;
      place-items: center;
      background: #09070a;
    }

    .play-fallback.visible {
      display: grid;
    }

    .play-fallback button {
      min-width: 120px;
      color: #ffffff;
      background: #17131a;
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.34);
    }

    @media (max-width: 520px) {
      body {
        padding: 14px;
      }

      .gift-card {
        max-height: calc(100svh - 28px);
        padding: 20px;
        border-radius: 26px;
      }

      .screen-inner {
        gap: 14px;
      }

      .placeholder {
        min-height: 132px;
        border-radius: 20px;
      }

      .actions {
        flex-direction: column;
      }

      button {
        width: 100%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="gift-card" aria-live="polite">
    <section class="screen visible" id="screen-gift" data-screen="gift">
      <div class="screen-inner">
        <!-- Replace this div with an img tag when your gift cat image is ready. -->
        <div class="placeholder gift">place cat image here</div>
        <h1>Please accept my gift</h1>
        <p>I worked really hard on this just for you</p>
        <div class="actions">
          <button class="yes-button" type="button" data-target="yes">Yes</button>
          <button class="no-button" type="button" data-target="no">No</button>
        </div>
      </div>
    </section>

    <section class="screen" id="screen-no" data-screen="no">
      <div class="screen-inner">
        <!-- Replace this div with an img tag when your angry cat image is ready. -->
        <div class="placeholder angry">place angry cat image here</div>
        <h2>How dare you</h2>
        <p>I cannot believe you just did that to me</p>
        <button class="try-again" type="button" data-target="gift">try again</button>
        <button class="text-link" type="button" data-target="gift">go back</button>
      </div>
    </section>

    <section class="screen" id="screen-yes" data-screen="yes">
      <div class="screen-inner">
        <!-- Replace this div with an img tag when your happy cat image is ready. -->
        <div class="placeholder happy">place happy cat image here</div>
        <h2>That's a good girl</h2>
        <p>I knew you would make the right choice</p>
        <button class="open-button" type="button" data-target="song">Open your gift</button>
      </div>
    </section>

    <section class="screen" id="screen-song" data-screen="song">
      <!-- Screen 4 intentionally has no visible card content. The video below enters fullscreen. -->
    </section>
  </main>

  <div class="play-fallback" id="play-fallback">
    <button type="button" id="play-video">Play</button>
  </div>

  <!-- Add your video file path to the empty src attribute below. -->
  <video class="fullscreen-video" id="gift-video" src="" controls playsinline></video>

  <script>
    const screens = Array.from(document.querySelectorAll(".screen"));
    const controls = document.querySelectorAll("[data-target]");
    const video = document.querySelector("#gift-video");
    const playFallback = document.querySelector("#play-fallback");
    const playButton = document.querySelector("#play-video");
    let activeScreen = document.querySelector(".screen.visible");

    async function requestVideoFullscreen() {
      if (video.requestFullscreen) {
        await video.requestFullscreen();
      } else if (video.webkitRequestFullscreen) {
        video.webkitRequestFullscreen();
      }
    }

    async function playFullscreenVideo() {
      playFallback.classList.remove("visible");

      try {
        await requestVideoFullscreen();
        await video.play();
      } catch (error) {
        playFallback.classList.add("visible");
      }
    }

    function showScreen(screenName) {
      const nextScreen = screens.find((screen) => screen.dataset.screen === screenName);

      if (!nextScreen || nextScreen === activeScreen) {
        return;
      }

      activeScreen.classList.remove("visible");
      nextScreen.classList.add("visible");
      activeScreen = nextScreen;

      if (screenName === "song") {
        playFullscreenVideo();
      }
    }

    controls.forEach((control) => {
      control.addEventListener("click", () => {
        showScreen(control.dataset.target);
      });
    });

    playButton.addEventListener("click", () => {
      playFullscreenVideo();
    });
  </script>
</body>
</html>
